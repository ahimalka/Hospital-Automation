name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Install Playwright
      run: playwright install --with-deps

    - name: Run tests
      run: python -m pytest --alluredir=allure-results

    - name: Checkout history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: allure-history

    - name: Build Allure Report
      if: always()
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.zip
        unzip allure-2.24.0.zip
        export PATH=$PATH:$(pwd)/allure-2.24.0/bin
        if [ -d allure-history/history ]; then cp -r allure-history/history temp-history; fi
        if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
          ./allure-2.24.0/bin/allure generate allure-results --clean -o allure-history
        else
          echo "No test results found, skipping report generation"
        fi
        if [ -d temp-history ]; then cp -r temp-history allure-history/history/; fi

    - name: Deploy to GitHub Pages
      id: deployment
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-history
