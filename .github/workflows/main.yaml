name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright
      run: playwright install --with-deps

    - name: Clean Cache and Run Tests
      # This step handles the fix. We removed the redundant 'Run tests' step below it.
      run: |
        echo "Running commit: $GITHUB_SHA"
        echo "---- pytest.ini ----"
        if [ -f pytest.ini ]; then cat pytest.ini; else echo "pytest.ini not found"; fi
        echo "---- conftest.py ----"
        if [ -f conftest.py ]; then cat conftest.py; else echo "conftest.py not found"; fi
        find . -type d -name "__pycache__" -exec rm -rf {} +
        rm -rf allure-results
        mkdir -p allure-results
        python -m pytest -p no:asyncio

    - name: Build Allure Report
      if: always()
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.zip
        unzip allure-2.24.0.zip
        export PATH=$PATH:$(pwd)/allure-2.24.0/bin
        rm -rf allure-history
        if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
          ./allure-2.24.0/bin/allure generate allure-results --clean -o allure-history
        else
          echo "No test results found, skipping report generation"
        fi

    - name: Copy Hospital App to Report Folder
      if: always()
      run: |
        if [ -f hospital.html ]; then cp hospital.html allure-history/; fi

    - name: Write Report Metadata
      if: always()
      run: |
        mkdir -p allure-history
        echo "$GITHUB_SHA" > allure-history/commit.txt
        date -u +"%Y-%m-%dT%H:%M:%SZ" > allure-history/generated-at-utc.txt

    - name: Deploy to GitHub Pages
      id: deployment
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-history
        destination_dir: report